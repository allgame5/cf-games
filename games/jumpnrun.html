<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Neon Runner - Jump 'n' Run | GameHub</title>
    <link rel="stylesheet" href="../css/jumpnrun.css">
</head>
<body>
    <!-- Preloader -->
    <div class="preloader">
        <div class="preloader-content">
            <div class="runner-loader"></div>
            <p>Lade Spiel...</p>
        </div>
    </div>

    <!-- Game Container -->
    <div class="game-container">
        <!-- Header mit Stats -->
        <div class="game-header">
            <div class="game-title">
                <span class="title-icon">🏃‍♂️</span>
                <h1>NEON RUNNER</h1>
                <span class="title-icon">⚡</span>
            </div>
            <div class="stats-panel">
                <div class="stat-card">
                    <div class="stat-icon">🎯</div>
                    <div class="stat-info">
                        <span class="stat-label">SCORE</span>
                        <span class="stat-value" id="score">0</span>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">🏆</div>
                    <div class="stat-info">
                        <span class="stat-label">BEST</span>
                        <span class="stat-value" id="highscore">0</span>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">⚡</div>
                    <div class="stat-info">
                        <span class="stat-label">SPEED</span>
                        <span class="stat-value" id="speedLevel">1</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Canvas Bereich -->
        <div class="canvas-wrapper">
            <canvas id="gameCanvas" width="1000" height="500"></canvas>
            
            <!-- UI Overlays -->
            <div class="game-overlay" id="gameOverlay" style="display: none;">
                <div class="overlay-content">
                    <div class="game-over-icon">💀</div>
                    <h2>GAME OVER</h2>
                    <div class="final-score">
                        <p>Dein Score</p>
                        <span id="finalScore">0</span>
                    </div>
                    <div class="overlay-buttons">
                        <button class="overlay-btn restart-btn" onclick="resetGame()">
                            🔄 Nochmal
                        </button>
                        <button class="overlay-btn menu-btn" onclick="window.location.href='../games.html'">
                            🏠 Menü
                        </button>
                    </div>
                </div>
            </div>

            <div class="pause-overlay" id="pauseOverlay" style="display: none;">
                <div class="pause-content">
                    <div class="pause-icon">⏸️</div>
                    <h2>PAUSE</h2>
                    <button class="overlay-btn" onclick="togglePause()">▶️ Weiter</button>
                </div>
            </div>

            <div class="start-prompt" id="startPrompt">
                <div class="prompt-content">
                    <div class="prompt-arrow">👆</div>
                    <p>Drücke <kbd>SPACE</kbd> oder <kbd>⬆️</kbd> zum Springen</p>
                    <button class="start-btn" onclick="startGame()">▶️ START</button>
                </div>
            </div>
        </div>

        <!-- Controls Info -->
        <div class="controls-info">
            <div class="control-key">
                <kbd>␣</kbd>
                <span>Springen</span>
            </div>
            <div class="control-key">
                <kbd>P</kbd>
                <span>Pause</span>
            </div>
            <div class="control-key">
                <kbd>R</kbd>
                <span>Neustart</span>
            </div>
            <div class="control-key mobile-only">
                <span>👆</span>
                <span>Tap zum Springen</span>
            </div>
        </div>

        <!-- Power-Up Anzeige -->
        <div class="powerup-bar" id="powerupBar">
            <div class="powerup-indicator" id="powerupIndicator" style="display: none;">
                <span id="powerupIcon">🛡️</span>
                <span id="powerupText">Shield</span>
                <div class="powerup-timer">
                    <div class="timer-fill" id="powerupTimer"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="../js/jumpnrun.js"></script>
</body>
</html>
